<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" name=”viewport” content="width=device-width, initial-scale=1.0">
        <title>Gray's Harbor Festival of Colors - Sponsors</title>

        <style>
            /* Reuse existing page styles for visual consistency */
            #alignDiv { width: 800px; margin: auto; }
            #navigation { padding-bottom: 10px; }
            #navTab {
                font-size: 18px; border-style:solid; border-color: navy;
                background-color:dodgerblue; color:white; height:50px; width:120px;
                text-shadow:-1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
            }
            #navTab:hover { border-color:red; }
            #pageHeader {

            }
            #bodyHeader {

            .sponsor-item { text-align: center; padding: 18px 0; }

            .sponsor-name { font-size: 32px; color: #222; }
            hr.divider { border: 0; border-top: 1px solid #ccc; margin: 12px 0; }

    <body id="body">
